<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Learning Fire Triangle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      background: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .header-container {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 16px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      min-height: 90px;
    }
    .title-row .title-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .title-row .logo-button {
      position: absolute;
      left: calc(50% + 280px);
    }
    .title-wrapper {
      text-align: center;
    }
    .title-wrapper h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #333;
      margin: 0;
    }
    .title-line {
      width: 60px;
      height: 3px;
      background: linear-gradient(to right, #ff7f2a, #ff4500);
      margin: 8px auto 0;
      border-radius: 2px;
    }
    .logo-button {
      background: linear-gradient(135deg, #1a1a1a, #374151);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .logo-button:hover {
      opacity: 0.85;
    }
    .logo-button img {
      height: 44px;
      width: auto;
    }
    .diagram-container {
      width: 26vw;
      max-width: 460px;
      overflow: visible;
    }
    .diagram-container svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }
    .caption {
      margin-top: 30px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      min-height: 2.5rem;
      transition: color 0.2s ease;
    }
    .description-box {
      width: 65vw;
      max-width: 900px;
      margin: 0 auto 20px;
      padding: 8px 20px 0;
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
      text-align: center;
    }
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .popup-overlay.active {
      display: flex;
    }
    .popup {
      border-radius: 16px;
      width: 640px;
      min-height: 340px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      position: relative;
      animation: popupIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }
    @keyframes popupIn {
      from { opacity: 0; transform: scale(0.92) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .popup-header {
      padding: 28px 32px 12px;
    }
    .popup-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: white;
    }
    .popup-body {
      padding: 12px 32px 32px;
      flex: 1;
    }
    .popup-body p {
      color: rgba(255,255,255,0.9);
      font-size: 0.92rem;
      line-height: 1.75;
      margin-bottom: 14px;
    }
    .popup-body h3 {
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      margin: 20px 0 10px;
    }
    .popup-body ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .popup-body ul li {
      color: rgba(255,255,255,0.9);
      font-size: 0.92rem;
      line-height: 1.75;
      padding: 4px 0 4px 28px;
      position: relative;
    }
    .popup-body ul li strong {
      color: white;
    }
    .popup-body ul li::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      opacity: 0.5;
    }
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .popup-close {
      background: rgba(255,255,255,0.2);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .popup-close:hover {
      background: rgba(255,255,255,0.35);
    }
    .igni-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .igni-card {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
      transition: all 0.2s;
    }
    .igni-card:hover {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-3px);
    }
    .igni-icon { font-size: 2rem; line-height: 1; }
    .igni-title { color: white; font-weight: 700; font-size: 0.82rem; margin-top: 8px; }
    .igni-desc { color: rgba(255,255,255,0.75); font-size: 0.76rem; margin-top: 5px; line-height: 1.4; }
    .oxy-stats { display: flex; justify-content: center; gap: 36px; margin: 18px 0 10px; }
    .oxy-ring-wrap { text-align: center; }
    .oxy-ring-svg { display: block; margin: 0 auto; }
    .oxy-ring-label { color: white; font-weight: 700; font-size: 0.82rem; margin-top: 8px; }
    .flipcard-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 12px 0 4px; }
    .flipcard { perspective: 700px; height: 148px; cursor: pointer; }
    .flipcard-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
    }
    .flipcard.flipped .flipcard-inner { transform: rotateY(180deg); }
    .flipcard-front, .flipcard-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 12px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 12px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .flipcard-front:hover { background: rgba(255,255,255,0.22); }
    .flipcard-back { transform: rotateY(180deg); background: rgba(255,255,255,0.25); }
    .fc-icon { font-size: 2rem; line-height: 1; }
    .fc-title { color: white; font-weight: 700; font-size: 0.82rem; margin-top: 8px; text-align: center; }
    .fc-hint { color: rgba(255,255,255,0.5); font-size: 0.68rem; margin-top: 6px; }
    .fc-back-text { color: white; font-size: 0.78rem; line-height: 1.55; text-align: center; }
  </style>
</head>

            <div class="flipcard" onclick="this.classList.toggle('flipped')">
              <div class="flipcard-inner">
                <div class="flipcard-front">
                  <div class="fc-icon">🪵</div>
                  <div class="fc-title">Wood &amp; Paper</div>
                  <div class="fc-hint">tap to flip</div>
                </div>
                <div class="flipcard-back">
                  <div class="fc-back-text">Books, cardboard, timber and furniture are common fuels — especially inside buildings.</div>
                </div>
              </div>
            </div>
            <div class="flipcard" onclick="this.classList.toggle('flipped')">
              <div class="flipcard-inner">
                <div class="flipcard-front">
                  <div class="fc-icon">🧵</div>
                  <div class="fc-title">Fabrics</div>
                  <div class="fc-hint">tap to flip</div>
                </div>
                <div class="flipcard-back">
                  <div class="fc-back-text">Clothing, curtains, carpets and upholstery can catch and spread fire very rapidly.</div>
                </div>
              </div>
            </div>
            <div class="flipcard" onclick="this.classList.toggle('flipped')">
              <div class="flipcard-inner">
                <div class="flipcard-front">
                  <div class="fc-icon">🛢️</div>
                  <div class="fc-title">Flammable Liquids</div>
                  <div class="fc-hint">tap to flip</div>
                </div>
                <div class="flipcard-back">
                  <div class="fc-back-text">Petrol, alcohol and solvents ignite easily and burn intensely, making them extremely hazardous.</div>
                </div>
              </div>
            </div>
          </div>
          <p style="margin-top:8px;">In nature, leaves and dry branches also act as fuels that can spread fire to vehicles and buildings.</p>
        `
      }
    };

    const caption = document.getElementById('caption');
    caption.textContent = 'Click On A Button to Learn More';
    caption.style.color = '#888';
    caption.style.fontWeight = '400';
    const popupOverlay = document.getElementById('popup-overlay');
    const popupTitleText = document.getElementById('popup-title-text');
    const popupBody = document.getElementById('popup-body');
    const popupHeader = document.getElementById('popup-header');
    const popupClose = document.getElementById('popup-close');

    function showPopup(id) {
      const content = popupContent[id];
      if (!content) return;
      popupTitleText.textContent = content.title;
      popupHeader.style.background = 'none';
      const popup = popupOverlay.querySelector('.popup');
      popup.style.background = `linear-gradient(135deg, ${content.color}, ${content.colorEnd || content.color}dd)`;
      popupBody.innerHTML = content.html;
      popupOverlay.classList.add('active');
      if (id === 'path1') {
        setTimeout(() => {
          popupBody.querySelectorAll('.ring-fill').forEach(el => {
            el.style.strokeDashoffset = el.dataset.target;
          });
        }, 60);
      }
    }

    function closePopup() {
      popupOverlay.classList.remove('active');
    }

    popupClose.addEventListener('click', closePopup);
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopup();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePopup();
    });

    (function() {
        const container = document.getElementById('svg-container');
        const svg = container.querySelector('svg');

        const textLabels = {
          'path3': { text: 'HEAT', x: 104.2, y: 74.9 },
          'path1': { text: 'OXYGEN', x: 58.5, y: 154.2 },
          'path2': { text: 'FUEL', x: 150.3, y: 154.2 }
        };

        Object.entries(textLabels).forEach(([id, info]) => {
          const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          textEl.setAttribute('x', info.x);
          textEl.setAttribute('y', info.y);
          textEl.setAttribute('text-anchor', 'middle');
          textEl.setAttribute('font-size', '10');
          textEl.setAttribute('font-weight', '700');
          textEl.setAttribute('font-family', 'system-ui, -apple-system, sans-serif');
          textEl.setAttribute('fill', 'white');
          textEl.setAttribute('dominant-baseline', 'central');
          textEl.setAttribute('pointer-events', 'none');
          textEl.textContent = info.text;
          svg.querySelector('#layer1').appendChild(textEl);
        });

        const clickableIds = ['path1', 'path2', 'path3', 'path4'];

        clickableIds.forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;

          el.style.cursor = 'pointer';
          el.style.transition = 'filter 0.25s ease';

          el.addEventListener('mouseenter', () => {
            el.style.filter = 'brightness(1.25)';
            const info = segmentLabels[id];
            if (info) {
              caption.textContent = info.label;
              caption.style.color = info.color;
              caption.style.fontWeight = '700';
            }
          });

          el.addEventListener('mouseleave', () => {
            el.style.filter = 'none';
            caption.textContent = 'Click On A Button to Learn More';
            caption.style.color = '#888';
            caption.style.fontWeight = '400';
          });

          el.addEventListener('click', () => {
            showPopup(id);
          });

        });
      })();
  </script>
</body>
</html>
